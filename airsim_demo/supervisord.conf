[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:xvfb]
command=Xvfb :99 -screen 0 1920x1080x24
autorestart=true
priority=100

[program:fluxbox]
command=fluxbox
environment=DISPLAY=":99"
autorestart=true
priority=200

[program:x11vnc]
command=x11vnc -display :99 -forever -shared -rfbport 5900
autorestart=true
priority=300

[program:novnc]
command=websockify --web=/usr/share/novnc/ 8080 localhost:5900
autorestart=true
priority=400
