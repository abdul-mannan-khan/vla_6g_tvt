# ros_gz_bridge config for VLA-6G Gazebo demo (X3 UAV)
- topic_name: /model/x3_uav/odometry
  ros_type_name: nav_msgs/msg/Odometry
  gz_type_name: gz.msgs.Odometry
  direction: GZ_TO_ROS

- topic_name: /X3/gazebo/command/twist
  ros_type_name: geometry_msgs/msg/Twist
  gz_type_name: gz.msgs.Twist
  direction: ROS_TO_GZ

- topic_name: /X3/enable
  ros_type_name: std_msgs/msg/Bool
  gz_type_name: gz.msgs.Boolean
  direction: ROS_TO_GZ
